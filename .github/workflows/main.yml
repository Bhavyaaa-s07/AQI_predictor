name: ML Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Model Integrity
      run: |
        python -c "import pickle; model = pickle.load(open('aqi_model.pkl', 'rb')); print('Model Loaded Successfully!')"

    - name: Docker Build Check
      run: |
        docker build -t aqi-test .